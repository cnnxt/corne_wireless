# ============================================================
#  BATTERY FIX — this is what was draining your Corne.
# ============================================================

# THE big one. In your old config this was commented out, so the
# keyboard never went to sleep. Now enabled.
CONFIG_ZMK_SLEEP=y

# Tuned for small 110 mAh cells: deep sleep after just 5 min idle (ms).
# Aggressive on purpose — with a battery this small, every idle minute counts.
# Bump to 600000 (10 min) if the ~1s wake-from-sleep delay annoys you.
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=300000

# Dim/idle the displays after 30s of no typing (ms), before full deep sleep.
# Saves nice!view refresh power during short pauses.
CONFIG_ZMK_IDLE_TIMEOUT=30000

# Your old config set Bluetooth to MAX transmit power (+8 dBm) for range,
# which burns extra battery. Left OFF by default now = stock power = better
# life. If you actually had range/dropout problems, uncomment ONE of these:
# CONFIG_BT_CTLR_TX_PWR_PLUS_8=y   # max range, worst battery (your old setting)
# CONFIG_BT_CTLR_TX_PWR_PLUS_4=y   # middle ground

# ---- Eager debouncing (kept from your config — snappy, fine for battery) ----
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=1
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=10

# ---- ZMK Studio: live keymap editing (kept ON — it's how we recovered this) ----
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n

# ---- nice!view displays (now driven by the nice-view-gem module) ----
# Shows battery, BLE/USB connection + profile, and the active layer,
# in the "gem" style. Requires the custom status screen below.
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y

# nice-view-gem tuning. Animation is ON by default and looks great, but it
# refreshes the screen constantly — rough on 110 mAh cells. Turning it OFF
# (and pinning a static frame) saves meaningful battery.
CONFIG_NICE_VIEW_GEM_ANIMATION=n
# Want the animation anyway? Comment the two lines above and it returns.

# ---- Battery % reporting over Bluetooth ----
CONFIG_ZMK_BATTERY_REPORTING=y

# USB logging stays OFF (it significantly increases power draw).
# CONFIG_ZMK_USB_LOGGING=y
