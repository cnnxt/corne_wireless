# Matches your cnnxt/corne_wireless build.yaml.
# The `studio-rpc-usb-uart` snippet on the LEFT (central) half is what
# keeps ZMK Studio working over USB — don't remove it.
---
include:
  - board: nice_nano_v2
    shield: corne_left nice_view_adapter nice_view_gem
    snippet: studio-rpc-usb-uart
  - board: nice_nano_v2
    shield: corne_right nice_view_adapter nice_view_gem
  # Optional: uncomment to also build a settings-reset firmware (only needed
  # if Bluetooth pairing ever gets stuck). Flashing this WILL wipe your
  # Studio keymap, so use it deliberately.
  # - board: nice_nano_v2
  #   shield: settings_reset
